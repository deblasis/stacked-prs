name: Test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install pyyaml pytest
      - name: Run offline test harness
        run: pytest tests/test_offline.py -v
        env:
          # Keep git happy on a fresh Actions runner
          GIT_AUTHOR_NAME: ci
          GIT_AUTHOR_EMAIL: ci@test.local
          GIT_COMMITTER_NAME: ci
          GIT_COMMITTER_EMAIL: ci@test.local
